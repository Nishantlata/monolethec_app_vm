trigger:
  branches:
    include:
      - main

pr: none

pool: Charlie Agent Pool

steps:
- task: TerraformInstaller@1
  inputs:
    terraformVersion: 'latest'

variables:
  source_code_location:'$(System.DefaultWorkingDirectory)/terraform-azure-infra'
  svn:$(svn)

- task: TerraformTask@5
  displayName: 'init'
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: $(source_code_location)
    backendServiceArm: $(svn)
    backendAzureRmStorageAccountName: 'backendstg10'
    backendAzureRmContainerName: 'backendcnt10'
    backendAzureRmKey: 'nishnat.tfstate'

- task: TerraformTask@5
  displayName: 'validate'
  inputs:
    provider: 'azurerm'
    command: 'validate'
    workingDirectory: $(source_code_location)
